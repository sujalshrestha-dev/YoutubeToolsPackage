<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video Data Retriever</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eff6ff', 500: '#2563eb', 600: '#1d4ed8', 700: '#1d4ed8' },
                        accent: '#22c55e'
                    }
                }
            }
        }
    </script>
    <style>
        /* ── Gradient title (same as SEO page) ── */
        .main-title {
            background: linear-gradient(90deg, #2563eb, #22c55e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* ── Subtle gradient header banner ── */
        .gradient-header {
            background: linear-gradient(135deg, rgba(37,99,235,.08), rgba(34,197,94,.08));
            border: 1px dashed #e2e8f0;
        }
        .dark .gradient-header {
            border-color: #334155;
        }

        /* ── Tag pill ── */
        .tag {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid #e2e8f0;
            border-radius: 9999px;
            transition: transform .1s ease, background .2s ease;
        }
        .tag:hover {
            transform: translateY(-1px);
            background: rgba(34, 197, 94, 0.25);
        }
        .dark .tag {
            border-color: #334155;
            background: rgba(34, 197, 94, 0.12);
        }

        /* ── Error / success banners ── */
        .error {
            background: rgba(239, 68, 68, 0.12);
            color: #ef4444;
            border-left: 4px solid #ef4444;
        }
        .success {
            background: rgba(16, 185, 129, 0.12);
            color: #10b981;
            border-left: 4px solid #10b981;
        }

        /* ── Thumbnail wrapper ── */
        .thumb-box {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            background: #f1f5f9;
            aspect-ratio: 16 / 9;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dark .thumb-box {
            border-color: #334155;
            background: #1e293b;
        }
        .thumb-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ── Description scroll box ── */
        .desc-box {
            max-height: 220px;
            overflow-y: auto;
            font-size: 0.875rem;
            line-height: 1.65;
            white-space: pre-wrap;
            word-break: break-word;
            color: #475569;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px 14px;
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }
        .dark .desc-box {
            color: #94a3b8;
            background: #0f172a;
            border-color: #334155;
            scrollbar-color: #475569 transparent;
        }
        .desc-box::-webkit-scrollbar { width: 5px; }
        .desc-box::-webkit-scrollbar-track { background: transparent; }
        .desc-box::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
        .dark .desc-box::-webkit-scrollbar-thumb { background: #475569; }

        /* ── Stat badge ── */
        .stat-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(37,99,235,.07);
            border: 1px solid rgba(37,99,235,.15);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #2563eb;
        }
        .dark .stat-badge {
            background: rgba(37,99,235,.12);
            border-color: rgba(37,99,235,.25);
            color: #60a5fa;
        }

        /* ── Section divider label ── */
        .section-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 10px;
            color: #1e293b;
        }
        .dark .section-label {
            color: #f1f5f9;
        }

        /* ── Smooth transition for dark mode ── */
        body { transition: background-color .3s ease, color .3s ease; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen dark:bg-slate-900 dark:text-slate-100">

<div th:replace="fragments/navbar :: navbar" th:with="activePage='video'"></div>

<div class="container mx-auto px-4 max-w-3xl mt-12 pb-16">

    <!-- ── Page header ── -->
    <div class="text-center mb-8">
        <h1 class="main-title text-4xl md:text-5xl font-extrabold mb-4">YouTube Video Data Retriever</h1>
        <div class="gradient-header rounded-xl p-4 mt-4">
            <p class="text-slate-600 dark:text-slate-400 text-lg mb-0">
                Enter a YouTube video URL or ID to fetch complete video information.
            </p>
        </div>
    </div>

    <!-- ── Input form ── -->
    <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-lg p-6 mb-8">
        <form th:action="@{/youtube/video-details}" method="post">
            <label for="videoUrlOrId"
                   class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
                YouTube Video URL or ID
            </label>
            <input type="text" id="videoUrlOrId" name="videoUrlOrId"
                   th:value="${videoUrlOrId}"
                   placeholder="https://www.youtube.com/watch?v=..."
                   required
                   class="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-lg
                          bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100
                          focus:border-blue-500 focus:ring-2 focus:ring-blue-200 dark:focus:ring-blue-800
                          transition-colors duration-200 mb-4">
            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-6
                           rounded-lg shadow-lg transition-colors duration-200 flex items-center justify-center gap-2">
                <i class="bi bi-search"></i> Fetch Video Data
            </button>
        </form>

        <!-- Error -->
        <div th:if="${error}" class="error rounded-lg p-4 mt-4" th:text="${error}"></div>
    </div>

    <!-- ── Result card ── -->
    <div th:if="${videoDetails != null}">
        <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-lg p-6">

            <div class="flex flex-col gap-6">

                <!-- Thumbnail + download -->
                <div class="flex flex-col gap-4">
                    <div class="thumb-box">
                        <img th:src="${videoDetails.thumbnailUrl}"
                             th:alt="${videoDetails.title}">
                    </div>
                    <a class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2 px-4
                              rounded-lg transition-colors duration-200 flex items-center justify-center gap-2"
                       th:href="${videoDetails.thumbnailUrl}"
                       th:download="${videoDetails.title + '-thumb.jpg'}"
                       target="_blank">
                        <i class="bi bi-download"></i> Download Thumbnail
                    </a>
                </div>

                <!-- Metadata (full width) -->
                <div class="flex flex-col gap-5">

                    <!-- Title -->
                    <div>
                        <div class="section-label">
                            <i class="bi bi-film text-blue-500"></i> Title
                        </div>
                        <p class="text-slate-800 dark:text-slate-100 font-semibold leading-snug"
                           th:text="${videoDetails.title}"></p>
                    </div>

                    <!-- Channel + date -->
                    <div class="flex flex-wrap gap-2">
                        <span class="stat-badge">
                            <i class="bi bi-person-video3"></i>
                            <span th:text="${videoDetails.channelTitle}"></span>
                        </span>
                        <span class="stat-badge">
                            <i class="bi bi-calendar3"></i>
                            <span th:text="${videoDetails.publishedAt}"></span>
                        </span>
                    </div>

                    <!-- Description -->
                    <div>
                        <div class="section-label">
                            <i class="bi bi-text-paragraph text-blue-500"></i> Description
                        </div>
                        <div class="desc-box"
                             th:text="${videoDetails.description != null ? videoDetails.description : 'No description available.'}">
                        </div>
                    </div>

                    <!-- Tags -->
                    <div>
                        <div class="section-label">
                            <i class="bi bi-tags text-blue-500"></i> Tags
                        </div>
                        <div th:if="${videoDetails.tags != null and videoDetails.tags.size() > 0}">
                            <span th:each="tag : ${videoDetails.tags}"
                                  class="tag inline-flex items-center gap-1 px-3 py-1 mr-2 mb-2 text-sm
                                         text-slate-700 dark:text-slate-200">
                                <i class="bi bi-hash text-green-500"></i>
                                <span th:text="${tag}"></span>
                            </span>
                        </div>
                        <div th:if="${videoDetails.tags == null or videoDetails.tags.size() == 0}"
                             class="text-slate-500 dark:text-slate-400 italic text-sm">
                            No tags available.
                        </div>
                    </div>

                </div><!-- /flex col -->
            </div>
        </div><!-- /result -->

    </div>

    <script>
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text)
                .then(() => alert("Copied!"))
                .catch(() => alert("Could not copy text."));
        }
    </script>
</body>
</html>
